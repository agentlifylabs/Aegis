# Local development compose — SQLite, no TLS, hot-reload via bind mount.
# Usage:
#   docker compose -f deploy/docker-compose.dev.yml up
version: "3.9"

services:
  aegisd:
    build:
      context: ..
      dockerfile: build/aegisd.Dockerfile
    image: aegis/aegisd:dev
    container_name: aegisd-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database across restarts.
      - aegis-data:/var/lib/aegis
      # Bind-mount a local aegis.yaml for easy config iteration.
      - ./config/aegis.dev.yaml:/etc/aegis/aegis.yaml:ro
    environment:
      - AEGIS_ENV=development
    command:
      - "--config=/etc/aegis/aegis.yaml"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  aegis-data:
    driver: local
