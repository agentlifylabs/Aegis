# Production compose — Postgres, TLS termination at reverse proxy (nginx/caddy).
# Prerequisites:
#   1. Create ./secrets/ directory with:
#        postgres-password   (file containing DB password)
#   2. Populate ./config/aegis.prod.yaml (see docs/hardening.md)
#   3. Set AEGIS_IMAGE=aegis/aegisd:v0.1 (or build locally)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml up -d
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres-password
    secrets:
      - postgres-password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Do not expose Postgres port externally in production.

  aegisd:
    image: ${AEGIS_IMAGE:-aegis/aegisd:dev}
    container_name: aegisd-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # TLS is terminated by the reverse proxy; aegisd listens on plain HTTP internally.
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config/aegis.prod.yaml:/etc/aegis/aegis.yaml:ro
      - aegis-traces:/var/lib/aegis
    secrets:
      - postgres-password
    environment:
      - AEGIS_ENV=production
    command:
      - "--config=/etc/aegis/aegis.yaml"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

secrets:
  postgres-password:
    file: ./secrets/postgres-password

volumes:
  postgres-data:
    driver: local
  aegis-traces:
    driver: local
